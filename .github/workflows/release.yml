name: Release

on:
  push:
    tags: ["v[0-9]+.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Wait for the CI workflow (triggered by the branch push) to pass on this
  # commit before building release artifacts. This avoids re-running CI — it
  # runs exactly once from the push-to-main trigger.
  wait-for-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI to pass on ${{ github.sha }}..."
          for i in $(seq 1 60); do
            # Check for a completed CI run on this commit
            result=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
              --jq "[.workflow_runs[] | select(.head_sha == \"${{ github.sha }}\")] | first | {status, conclusion}" \
              2>/dev/null || echo '{}')

            status=$(echo "$result" | jq -r '.status // empty')
            conclusion=$(echo "$result" | jq -r '.conclusion // empty')

            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI passed!"
                exit 0
              else
                echo "::error::CI failed (conclusion: $conclusion) — aborting release"
                exit 1
              fi
            fi

            echo "CI status: ${status:-pending} (attempt $i/60, waiting 10s)"
            sleep 10
          done
          echo "::error::Timed out waiting for CI after 10 minutes"
          exit 1

  gate:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)"
            exit 1
          fi

  build-linux:
    needs: gate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: Install FFmpeg development libraries
        run: sudo apt-get update && sudo apt-get install -y libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev libavfilter-dev libavdevice-dev pkg-config clang libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          tar czf bluback-${{ matrix.target }}.tar.gz \
            -C target/release bluback \
            -C "$GITHUB_WORKSPACE" LICENSE README.md

      - uses: actions/upload-artifact@v4
        with:
          name: bluback-${{ matrix.target }}
          path: bluback-${{ matrix.target }}.tar.gz

  build-macos:
    needs: gate
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          brew install ffmpeg llvm pkg-config
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          tar czf bluback-${{ matrix.target }}.tar.gz \
            -C target/release bluback \
            -C "$GITHUB_WORKSPACE" LICENSE README.md

      - uses: actions/upload-artifact@v4
        with:
          name: bluback-${{ matrix.target }}
          path: bluback-${{ matrix.target }}.tar.gz

  publish:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install FFmpeg development libraries
        run: >
          sudo apt-get update && sudo apt-get install -y
          libavformat-dev libavcodec-dev libavutil-dev
          libswscale-dev libswresample-dev libavfilter-dev libavdevice-dev
          pkg-config clang libclang-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$prev_tag" ]; then
            log=$(git log --pretty=format:'- %s' "$prev_tag".."$GITHUB_REF_NAME")
          else
            log=$(git log --pretty=format:'- %s')
          fi
          {
            echo 'body<<EOF'
            echo "$log"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*.tar.gz
